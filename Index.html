<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Clínica Veterinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="./assets/css/main.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary" id="navbar" style="display: none;">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-heart-pulse"></i>
                Clínica Veterinaria
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3" id="welcomeText"></span>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn">
                    <i class="bi bi-box-arrow-right"></i>
                    Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <div class="container mt-5" id="loginSection">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4><i class="bi bi-person-lock"></i> Iniciar Sesión</h4>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="usuario" class="form-label">Usuario:</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-person"></i>
                                    </span>
                                    <input type="text" class="form-control" id="usuario" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña:</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-lock"></i>
                                    </span>
                                    <input type="password" class="form-control" id="password" required>
                                </div>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-box-arrow-in-right"></i>
                                    Ingresar
                                </button>
                            </div>
                        </form>
                        <div id="loginError" class="alert alert-danger mt-3" style="display: none;"></div>
                        <div class="mt-4 p-3 bg-light border rounded">
                            <h6 class="text-muted border-bottom pb-2">Cuentas de prueba:</h6>
                            <div id="cuentasPrueba" class="small">
                                <!-- Aquí se cargarán los usuarios automáticamente -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div class="container mt-4" id="dashboardSection" style="display: none;">

        <div class="row mb-4">
            <div class="col">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col">
                                <h3><i class="bi bi-clipboard-data"></i> Panel de Control</h3>
                                <p class="mb-0" id="veterinarioInfo"></p>
                            </div>
                            <div class="col-auto">
                                <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#addMascotaModal">
                                    <i class="bi bi-paw"></i>
                                    Agregar Mascota
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" class="form-control" id="searchMascota"
                                placeholder="Buscar mascota por nombre...">
                            <button class="btn btn-outline-secondary" type="button" id="clearSearch">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-paw"></i> Mis Mascotas</h5>
                        <span class="badge bg-secondary" id="mascotaCount">0</span>
                    </div>
                    <div class="card-body">
                        <div id="mascotaList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addMascotaModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-paw"></i>
                        Agregar Nueva Mascota
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addMascotaForm">
                        <h6 class="text-primary mb-3">
                            <i class="bi bi-paw"></i>
                            Datos de la Mascota
                        </h6>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="mascotaNombre" class="form-label">Nombre *</label>
                                <input type="text" class="form-control" id="mascotaNombre" required>
                            </div>
                            <div class="col-md-6">
                                <label for="mascotaDueno" class="form-label">Dueño *</label>
                                <input type="text" class="form-control" id="mascotaDueno" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="mascotaApellidoDueno" class="form-label">Apellido Dueño *</label>
                                <input type="text" class="form-control" id="mascotaApellidoDueno" required>
                            </div>
                            <div class="col-md-6">
                                <label for="mascotaFechaNacimiento" class="form-label">Fecha de Nacimiento *</label>
                                <input type="date" class="form-control" id="mascotaFechaNacimiento" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label for="mascotaevolucionmedica" class="form-label">Evolucion Medica *</label>
                                <input type="text" class="form-control" id="mascotaevolucionmedica" required>
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" form="addMascotaForm" class="btn btn-primary">
                <i class="bi bi-save"></i>
                Guardar Mascota
            </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            <div id="addMascotaError" class="alert alert-danger" style="display: none;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./assets/js/main.js"></script>

</body>

</html>
